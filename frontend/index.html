<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📬 SMS Spam Classifier</h1>
        <p>Type a message and the model will detect if it's spam or not.</p>

        <textarea id="messageInput" placeholder="Enter your message here..."></textarea>

        <button id="predictBtn">Detect Spam</button>

        <div id="result" class="result hidden">
            <div class="result-label" id="predictionLabel"></div>
            <div class="result-confidence" id="confidenceText"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
